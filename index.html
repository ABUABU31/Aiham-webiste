          skills.append(span);
        });

        const education = document.getElementById("education-list");
        education.replaceChildren();
        t.education.forEach((item) => {
          const article = document.createElement("article");
          article.className = "facts";
          article.innerHTML = `<h3>${item[0]}</h3><p>${item[1]}</p><p>${item[2]}</p>`;
          education.append(article);
        });

        const notes = document.getElementById("notes-list");
        notes.replaceChildren();
        t.notes.forEach((item) => {
          const article = document.createElement("article");
          article.innerHTML = `<h3>${item[0]}</h3><p>${item[1]}</p>`;
          notes.append(article);
        });
      }

      document.querySelectorAll("[data-lang]").forEach((button) => {
        button.addEventListener("click", () => setLang(button.dataset.lang));
      });
      setLang(savedLang);
    </script>
  </body>
</html>
